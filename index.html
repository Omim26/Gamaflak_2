<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gamaflak 2 - Stellar Harmony</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; background: #020205; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; touch-action: none; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .btn { background: #6081FF; border: none; color: white; padding: 18px; border-radius: 35px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 20px rgba(96,129,255,0.4); transition: 0.3s; width: 130px; }
        .btn-share { background: #25D366; width: 180px; margin-top: 15px; }
        .btn:active { transform: scale(0.9); opacity: 0.8; }
        
        #ui { position: absolute; top: 15px; left: 15px; z-index: 50; display: none; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; backdrop-filter: blur(10px); border-left: 5px solid #ffcc00; }
        #sun { width: 30px; height: 30px; background: radial-gradient(circle, #ffcc00, #ff6600); border-radius: 50%; box-shadow: 0 0 40px #ff6600; position: absolute; z-index: 10; }
        
        .orbit { position: absolute; border: 1.2px solid; border-radius: 50%; animation: rotate linear infinite; pointer-events: none; }
        .planet { 
            position: absolute; top: 0; left: 50%; transform: translate(-50%, -50%); width: 34px; height: 34px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; cursor: pointer; pointer-events: auto;
            box-shadow: inset -5px -5px 12px rgba(0,0,0,0.8); 
        }
        
        #new-record { color: #ffcc00; font-weight: bold; display: none; animation: blink 0.5s infinite; font-size: 14px; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .asteroid { position: absolute; width: 2px; height: 2px; background: #fff; border-radius: 50%; opacity: 0.3; }
    </style>
</head>
<body>

    <div id="ui">
        <b style="color:#ffcc00">MODE: <span id="modeDisp">-</span></b><br>
        <b>SCORE: <span id="score">0</span></b><br>
        <small>BEST: <span id="highscore">0</span></small><br>
        <div id="new-record">★ NEW RECORD! ★</div>
        <button class="btn btn-share" style="padding: 8px; font-size: 12px; height: auto;" onclick="shareScore()">SHARE SCORE</button>
    </div>

    <div id="overlay">
        <h1 style="letter-spacing: 5px;">GAMAFLAK 2</h1>
        <p>CHOOSE FREQUENCY :</p>
        <div class="btn-grid">
            <button class="btn" onclick="selectMode('DO', 261.63, 1)">C / DO</button>
            <button class="btn" onclick="selectMode('MI', 329.63, 1.5)">E / MI</button>
            <button class="btn" onclick="selectMode('FA', 349.23, 2)">F / FA</button>
            <button class="btn" onclick="selectMode('SOL', 392.00, 2.5)">G / SOL</button>
        </div>
    </div>

    <div id="sun"></div>

    <script>
        let score = 0, audioCtx = null, multiplier = 1, currentMode = "";
        let highscore = parseInt(localStorage.getItem('gamaflak_record')) || 0;
        let recordBeaten = false;
        document.getElementById('highscore').innerText = highscore;

        function selectMode(name, freq, mult) {
            multiplier = mult; currentMode = name;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1.5);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 1.5);

            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('ui').style.display = 'block';
                document.getElementById('modeDisp').innerText = name;
                renderSystem();
            }, 300);
        }

        function updateScore(pts, isGiant) {
            score += Math.round(pts * multiplier);
            document.getElementById('score').innerText = score;
            if (isGiant && navigator.vibrate) navigator.vibrate(30);
            
            if(score > highscore) {
                if(!recordBeaten && highscore > 0) {
                    document.getElementById('new-record').style.display = 'block';
                    recordBeaten = true;
                }
                highscore = score;
                localStorage.setItem('gamaflak_record', highscore);
                document.getElementById('highscore').innerText = highscore;
            }
        }

        async function shareScore() {
            const shareData = {
                title: 'Gamaflak 2',
                text: `I just hit a NEW RECORD of ${score} points in Gamaflak 2! Can you beat me?`,
                url: window.location.href
            };
            try { if (navigator.share) await navigator.share(shareData); } catch (err) {}
        }

        function playSpaceNote(f) {
            if (!audioCtx) return;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'triangle';
            o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(0.2, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1.2);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + 1.2);
        }

        function renderSystem() {
            const planets = [
                {t:"Me", c:"#979797", d:85, s:4, f:261, p:10, g:false},
                {t:"Ve", c:"#E3BB76", d:130, s:7, f:293, p:15, g:false},
                {t:"Ea", c:"#2271B3", d:180, s:10, f:329, p:20, g:false},
                {t:"Ma", c:"#E27B58", d:230, s:13, f:349, p:25, g:false},
                {t:"Ju", c:"#D39C7E", d:310, s:20, f:392, p:40, g:true},
                {t:"Sa", c:"#C5AB6E", d:390, s:25, f:440, p:50, g:true},
                {t:"Ur", c:"#BBE1E4", d:470, s:35, f:493, p:60, g:true},
                {t:"Ne", c:"#6081FF", d:550, s:45, f:523, p:70, g:true}
            ];
            planets.forEach(p => {
                const orb = document.createElement('div');
                orb.className = 'orbit';
                orb.style.width = orb.style.height = p.d + 'px';
                orb.style.animationDuration = p.s + 's';
                orb.style.borderColor = p.c + '44';
                const pl = document.createElement('div');
                pl.className = `planet`;
                pl.style.backgroundColor = p.c;
                pl.innerText = p.t;
                pl.onclick = (e) => { e.stopPropagation(); playSpaceNote(p.f); updateScore(p.p, p.g); };
                orb.appendChild(pl);
                document.body.appendChild(orb);
            });
            const belt = document.createElement('div');
            belt.className = 'orbit'; belt.style.width = belt.style.height = '270px';
            belt.style.animationDuration = '22s'; belt.style.border = 'none';
            for(let i=0; i<50; i++) {
                const a = document.createElement('div');
                a.className = 'asteroid';
                let ang = (i/50) * Math.PI * 2;
                a.style.left = (Math.cos(ang)*135 + 135) + 'px';
                a.style.top = (Math.sin(ang)*135 + 135) + 'px';
                belt.appendChild(a);
            }
            document.body.appendChild(belt);
        }
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>
</body>
</html>

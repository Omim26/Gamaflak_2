<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gamaflak</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://ably.com"></script>
    <style>
        * { box-sizing: border-box; perspective: none !important; transform-style: flat !important; }
        body { margin: 0; background: #020205; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .btn { background: #6081FF; border: none; color: white; padding: 15px; border-radius: 30px; font-size: 14px; font-weight: bold; cursor: pointer; width: 130px; }
        input { background: rgba(255,255,255,0.1); border: 2px solid #6081FF; border-radius: 20px; padding: 10px; color: white; margin-bottom: 20px; text-align: center; }

        #ui { position: absolute; top: 15px; left: 15px; z-index: 50; display: none; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; backdrop-filter: blur(10px); border-left: 5px solid #ffcc00; }
        #leaderboard { position: absolute; top: 15px; right: 15px; z-index: 50; display: none; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 15px; min-width: 150px; font-size: 14px; }
        #sun { width: 40px; height: 40px; background: radial-gradient(circle, #ffcc00, #ff6600); border-radius: 50%; box-shadow: 0 0 30px #ff6600; position: absolute; z-index: 90; cursor: pointer; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; font-size: 22px; }
        .orbit { position: absolute; border: 1px solid rgba(255,255,255,0.15); border-radius: 50%; animation: rotate linear infinite; pointer-events: none; }
        .planet { position: absolute; top: 0; left: 50%; transform: translate(-50%, -50%); width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; cursor: pointer; pointer-events: auto; box-shadow: inset -4px -4px 8px rgba(0,0,0,0.8); z-index: 80; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="ui">
        <b id="my-name" style="color:#ffcc00;">PLAYER</b><br>
        <small>KEY: <span id="modeDisp">-</span></small>
    </div>

    <div id="leaderboard">
        <div style="color:#ffcc00; margin-bottom:5px; border-bottom:1px solid #444;">LIVE SCORES</div>
        <div id="player-list"></div>
    </div>

    <div id="overlay">
        <h1>GAMAFLAK</h1>
        <div id="step0">
            <input type="text" id="playerName" placeholder="Enter your name..." maxlength="10">
            <br>
            <button class="btn" style="width:200px" onclick="validateName()">JOIN LOBBY</button>
        </div>
        <div id="step1" style="display:none;">
            <p>AGREE ON A NOTE :</p>
            <div class="btn-grid">
                <button class="btn" onclick="initMulti('DO', 1)">DO (x1)</button>
                <button class="btn" onclick="initMulti('MI', 1.5)">MI (x1.5)</button>
                <button class="btn" onclick="initMulti('FA', 2)">FA (x2)</button>
                <button class="btn" onclick="initMulti('SOL', 2.5)">SOL (x2.5)</button>
            </div>
        </div>
    </div>

    <div id="system-container" style="position:relative; width:100vw; height:100vh; display:flex; align-items:center; justify-content:center;">
        <div id="sun" onclick="location.reload()">S</div>
    </div>

    <script>
        let score = 0, audioCtx = null, multiplier = 1, myName = "", ably, channel;
        let playersScores = {};

        // --- CONFIGURATION ABLY ---
        // Remplace par ta clé Ably pour que ça marche en ligne !
        const ABLY_KEY = 'TON_API_KEY_ABLY'; 

        function validateName() {
            let input = document.getElementById('playerName').value.trim();
            if(input === "") return alert("Please enter a name");
            myName = input;
            document.getElementById('step0').style.display = 'none';
            document.getElementById('step1').style.display = 'block';
        }

        function initMulti(mode, mult) {
            multiplier = mult;
            document.getElementById('modeDisp').innerText = mode;
            document.getElementById('my-name').innerText = myName;
            
            // Connexion Ably
            if(ABLY_KEY !== 'fLnNJA.dOy3HQ:GLmXxSIjEKpZwMm4n54ZE91hfEYMd1NS3veSJv9-n_0') {
                ably = new Ably.Realtime(ABLY_KEY);
                channel = ably.channels.get('gamaflak-room');
                
                // Écouter les scores des autres
                channel.subscribe('score-update', (msg) => {
                    playersScores[msg.data.user] = msg.data.score;
                    updateLeaderboard();
                });
            }

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            document.getElementById('leaderboard').style.display = 'block';
            renderSystem();
        }

        function updateScore(pts, key) {
            score += Math.round(pts * multiplier);
            playersScores[myName] = score;
            updateLeaderboard();

            // Envoyer mon score aux autres
            if(channel) {
                channel.publish('score-update', { user: myName, score: score });
            }
        }

        function updateLeaderboard() {
            const list = document.getElementById('player-list');
            list.innerHTML = "";
            Object.keys(playersScores).sort((a,b) => playersScores[b] - playersScores[a]).forEach(user => {
                const item = document.createElement('div');
                item.innerHTML = `<span style="color:${user === myName ? '#ffcc00':'#aaa'}">${user}: ${playersScores[user]}</span>`;
                list.appendChild(item);
            });
        }

        function playNote(f) {
            if (!audioCtx) return;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'triangle';
            o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + 1);
        }

        function renderSystem() {
            const container = document.getElementById('system-container');
            const planetData = {
                "Me": {c:"#979797", orb:95, speed:5, f:261, p:10},
                "Ve": {c:"#E3BB76", orb:145, speed:8, f:293, p:15},
                "Ea": {c:"#2271B3", orb:195, speed:12, f:329, p:20},
                "Ma": {c:"#E27B58", orb:245, speed:16, f:349, p:25},
                "Ju": {c:"#D39C7E", orb:325, speed:22, f:392, p:40},
                "Sa": {c:"#C5AB6E", orb:405, speed:30, f:440, p:50},
                "Ur": {c:"#BBE1E4", orb:485, speed:40, f:493, p:60},
                "Ne": {c:"#6081FF", orb:565, speed:50, f:523, p:70}
            };

            Object.keys(planetData).forEach(key => {
                const p = planetData[key];
                const orb = document.createElement('div');
                orb.className = 'orbit';
                orb.style.width = orb.style.height = p.orb + 'px';
                orb.style.animationDuration = p.speed + 's';
                orb.style.borderColor = p.c + '66';
                const pl = document.createElement('div');
                pl.className = 'planet';
                pl.style.backgroundColor = p.c;
                pl.innerText = key;
                pl.onclick = (e) => { e.stopPropagation(); playNote(p.f); updateScore(p.p, key); };
                orb.appendChild(pl);
                container.appendChild(orb);
            });
        }
    </script>
</body>
</html>

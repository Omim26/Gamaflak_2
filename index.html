<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GamAflak | Hyper Fusion</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Orbitron', sans-serif; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        /* Intro & Flash */
        #intro-layer { position: fixed; inset: 0; background: #000; z-index: 200; display: flex; align-items: center; justify-content: center; perspective: 1000px; cursor: pointer; }
        #flash { position: fixed; inset: 0; background: #fff; opacity: 0; z-index: 210; pointer-events: none; }
        
        .word { position: absolute; font-size: 8vw; font-weight: 900; transition: all 1.5s cubic-bezier(0.19, 1, 0.22, 1); opacity: 0; }
        
        /* Position initiale : 30° de rotation */
        #part-1 { color: #ff4444; transform: translateX(-150%) rotateY(30deg); }
        #part-2 { color: #44ff44; transform: translateX(150%) rotateY(-30deg); }
        
        /* Fusion : Suppression du E et A via la largeur à 0 et opacité */
        .fusion-active #part-1 { opacity: 1; transform: translateX(-48%) rotateY(0deg); }
        .fusion-active #part-2 { opacity: 1; transform: translateX(52%) rotateY(0deg); }
        
        .letter-kill { display: inline-block; transition: all 0.3s ease 1.2s; width: 1em; opacity: 1; }
        .fusion-active .letter-kill { width: 0; opacity: 0; transform: scale(0); }

        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .btn { background: #44ff44; border: none; color: #000; padding: 15px 40px; border-radius: 40px; font-size: 18px; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; box-shadow: 0 0 20px #44ff4466; }

        @keyframes flashEffect { 0% { opacity: 0; } 10% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="flash"></div>

    <div id="intro-layer" onclick="runCinematic()">
        <div id="part-1" class="word">GAM<span class="letter-kill">E</span></div>
        <div id="part-2" class="word"><span class="letter-kill">A</span>FLAK</div>
    </div>

    <div id="overlay">
        <h1 style="color:#ff4444; letter-spacing:10px">GAMAFLAK</h1>
        <button class="btn" onclick="location.reload()">REPLAY</button>
    </div>

    <script>
        let audioCtx;

        function playSpaceSound() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioCtx.currentTime;

            // Le "Sweep" de l'espace
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(60, now);
            osc.frequency.exponentialRampToValueAtTime(1200, now + 1.2);
            gain.gain.setValueAtTime(0.01, now);
            gain.gain.exponentialRampToValueAtTime(0.2, now + 1.2);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(now + 1.3);

            // L'Impact de fusion (Bass Drop)
            setTimeout(() => {
                const impact = audioCtx.createOscillator();
                const impactGain = audioCtx.createGain();
                impact.type = 'triangle';
                impact.frequency.setValueAtTime(80, audioCtx.currentTime);
                impact.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
                impactGain.gain.setValueAtTime(0.8, audioCtx.currentTime);
                impactGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.5);
                impact.connect(impactGain); impactGain.connect(audioCtx.destination);
                impact.start(); impact.stop(audioCtx.currentTime + 1.5);
                
                // Vibrations haptiques si sur mobile
                if (navigator.vibrate) navigator.vibrate(200);
            }, 1200);
        }

        function runCinematic() {
            const intro = document.getElementById('intro-layer');
            if (intro.classList.contains('fusion-active')) return;
            
            intro.classList.add('fusion-active');
            playSpaceSound();

            // Déclenchement du Flash Blanc
            setTimeout(() => {
                document.getElementById('flash').style.animation = "flashEffect 0.8s forwards";
            }, 1200);

            // Transition finale
            setTimeout(() => {
                intro.style.opacity = '0';
                setTimeout(() => {
                    intro.style.display = 'none';
                    document.getElementById('overlay').style.display = 'flex';
                }, 800);
            }, 3000);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gamaflak 2 - Système Solaire Animé</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { 
            margin: 0; background: radial-gradient(circle, #1b2735 0%, #090a0f 100%); 
            height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }

        /* Le Soleil */
        #sun {
            width: 60px; height: 60px; background: #ffcc00; border-radius: 50%;
            box-shadow: 0 0 50px #ff6600, inset -5px -5px 15px rgba(0,0,0,0.3);
            position: absolute; display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: #000; font-size: 20px; z-index: 10;
        }

        /* L'espace de révolution */
        .orbit {
            position: absolute; border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%; animation: rotate linear infinite;
        }

        /* La Sphère Planétaire */
        .planet {
            position: absolute; top: 0; left: 50%; transform: translate(-50%, -50%);
            width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: bold; color: white;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.7);
        }

        /* Animation de rotation */
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Configuration des 8 planètes (Taille orbite | Vitesse rotation | Couleur) */
        .mercure { width: 100px; height: 100px; animation-duration: 4s; }
        .m-body { background: #979797; }

        .venus { width: 150px; height: 150px; animation-duration: 7s; }
        .v-body { background: #E3BB76; }

        .terre { width: 200px; height: 200px; animation-duration: 10s; }
        .t-body { background: #2271B3; }

        .mars { width: 250px; height: 250px; animation-duration: 13s; }
        .ma-body { background: #E27B58; }

        .jupiter { width: 320px; height: 320px; animation-duration: 20s; }
        .j-body { background: #D39C7E; width: 45px; height: 45px; font-size: 20px; }

        .saturne { width: 400px; height: 400px; animation-duration: 25s; }
        .s-body { background: #C5AB6E; width: 40px; height: 40px; }

        .uranus { width: 460px; height: 460px; animation-duration: 35s; }
        .u-body { background: #BBE1E4; color: #333; }

        .neptune { width: 520px; height: 520px; animation-duration: 45s; }
        .n-body { background: #6081FF; }
    </style>
</head>
<body>

    <div id="sun">S</div>

    <!-- Orbites et Planètes -->
    <div class="orbit mercure"><div class="planet m-body">M</div></div>
    <div class="orbit venus"><div class="planet v-body">V</div></div>
    <div class="orbit terre"><div class="planet t-body">T</div></div>
    <div class="orbit mars"><div class="planet ma-body">M</div></div>
    <div class="orbit jupiter"><div class="planet j-body">J</div></div>
    <div class="orbit saturne"><div class="planet s-body">S</div></div>
    <div class="orbit uranus"><div class="planet u-body">U</div></div>
    <div class="orbit neptune"><div class="planet n-body">N</div></div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                .then(() => console.log("Système solaire prêt !"));
            });
        }
    </script>
</body>
</html>

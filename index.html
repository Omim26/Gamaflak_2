<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gamaflak | Realistic Solar System</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
		
		@import url('https://fonts.googleapis.com/css?lang=en&family=Product+Sans|Google+Sans+Text:400,500');.gb_yb {
		                font: 13px/27px Roboto,Arial,sans-serif;
		                z-index: 986
		            }
	
	
	
        * { box-sizing: border-box; perspective: none !important; }
        body { margin: 0; background: #010103; color: white; font-family: 'Orbitron', sans-serif; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; touch-action: none; }
        
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .btn { background: #6081FF; border: none; color: white; padding: 15px; border-radius: 30px; font-size: 14px; font-weight: bold; cursor: pointer; width: 140px; font-family: 'Orbitron', sans-serif; transition: 0.2s; }
        .btn:active { background: #ffcc00; color: black; transform: scale(0.95); }
        input { background: rgba(255,255,255,0.1); border: 2px solid #6081FF; border-radius: 20px; padding: 12px; color: white; margin-bottom: 15px; text-align: center; width: 250px; font-size: 16px; outline: none; font-family: 'Orbitron', sans-serif; }

        #ui { position: absolute; top: 15px; left: 15px; z-index: 50; display: none; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; backdrop-filter: blur(10px); border-left: 5px solid #ffcc00; }
        #leaderboard { position: absolute; top: 15px; right: 15px; z-index: 50; display: none; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 15px; min-width: 180px; border: 1px solid #444; }
        
        /* Panneau de distance en bas à droite */
        #dist-panel { position: absolute; bottom: 20px; right: 20px; z-index: 50; display: none; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; border: 1px solid #444; font-size: 13px; text-align: right; min-width: 180px; border-right: 5px solid #6081FF; }
        
        .leader-item { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; padding: 4px 8px; border-radius: 5px; }
        .me-highlight { background: rgba(255, 204, 0, 0.2); border: 1px solid #ffcc00; color: #ffcc00; font-weight: bold; }

        #system-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        #sun { width: 60px; height: 60px; background: radial-gradient(circle, #fff500, #ff6600); border-radius: 50%; box-shadow: 0 0 50px #ff6600; z-index: 90; cursor: pointer; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; }
        .orbit { position: absolute; border: 1px solid rgba(255,255,255,0.08); border-radius: 50%; animation: rotate linear infinite; pointer-events: none; }
        
        .planet { position: absolute; top: 0; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; border-radius: 50%; cursor: pointer; pointer-events: auto; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; box-shadow: inset -5px -5px 10px rgba(0,0,0,0.8); color: white; transition: 0.1s; }
        
        /* Anneaux de Saturne */
        .rings { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotateX(70deg); width: 50px; height: 50px; border: 4px solid rgba(197, 171, 110, 0.4); border-radius: 50%; pointer-events: none; }

        .particle { position: absolute; width: 4px; height: 4px; border-radius: 50%; pointer-events: none; z-index: 110; transition: transform 0.6s ease-out, opacity 0.6s ease-out; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="ui">
        <b style="color:#ffcc00">SYSTEM READY</b><br>
        <small>MODE: <span id="modeDisp">-</span></small>
    </div>

    <div id="leaderboard">
        <div id="player-list"></div>
    </div>

    <div id="dist-panel">
        <span id="p-full" style="color:#ffcc00; font-weight:bold; text-transform: uppercase;">Target</span><br>
        <span id="p-val" style="font-size:18px;">---</span> <small>M km</small>
    </div>

    <div id="overlay">
        <h1 style="letter-spacing: 8px; color:#6081FF;">GAMAFLAK</h1>
        <div id="step-note">
            <p>1. SELECT BASE FREQUENCY</p>
            <div class="btn-grid">
                <button class="btn" onclick="setNote('DO', 261.63)">C / DO</button>
                <button class="btn" onclick="setNote('MI', 329.63)">E / MI</button>
                <button class="btn" onclick="setNote('FA', 349.23)">F / FA</button>
                <button class="btn" onclick="setNote('SOL', 392.00)">G / SOL</button>
            </div>
        </div>
        <div id="step-count" style="display:none;">
            <p>2. HOW MANY PLAYERS?</p>
            <div class="btn-grid">
                <button class="btn" onclick="setPlayerCount(1)">1 PLAYER</button>
                <button class="btn" onclick="setPlayerCount(2)">2 PLAYERS</button>
                <button class="btn" onclick="setPlayerCount(4)">4 PLAYERS</button>
            </div>
        </div>
        <div id="step-names" style="display:none;">
            <p id="name-prompt">PLAYER 1 NAME</p>
            <input type="text" id="nameInput" placeholder="Name..." maxlength="10">
            <br>
            <button class="btn" id="nameNextBtn" style="width:220px; background:#ffcc00; color:black;" onclick="nextName()">CONTINUE</button>
        </div>
    </div>

    <div id="system-container">
        <div id="sun" onclick="location.reload()">S</div>
    </div>

    <script src="https://ably.com"></script>
    <script>
        const PLANETS_DATA = [
            {n: "Me", full: "Mercury", r: 1.000, c: "#A5A5A5", d: "57.9"},
            {n: "Ve", full: "Venus", r: 1.125, c: "#E3BB76", d: "108.2"},
            {n: "Ea", full: "Earth", r: 1.250, c: "#2271B3", d: "149.6"},
            {n: "Ma", full: "Mars", r: 1.333, c: "#E27B58", d: "227.9"},
            {n: "Ju", full: "Jupiter", r: 1.500, c: "#D39C7E", d: "778.6"},
            {n: "Sa", full: "Saturn", r: 1.666, c: "#C5AB6E", d: "1433.5", rings: true},
            {n: "Ur", full: "Uranus", r: 1.875, c: "#BBE1E4", d: "2872.5"},
            {n: "Ne", full: "Neptune", r: 2.000, c: "#6081FF", d: "4495.1"}
        ];
        
        let audioCtx = null, baseFreq = 261.63;
        let targetPlayers = 1, currentNameIndex = 1, playerNames = [], playersScores = {};
        let currentPlayerTurn = 0, ably, channel;

        const ABLY_KEY = 'fLnNJA.dOy3HQ:GLmXxSIjEKpZwMm4n54ZE91hfEYMd1NS3veSJv9-n_0';

        function setNote(mode, freq) {
            baseFreq = freq;
            document.getElementById('modeDisp').innerText = mode;
            document.getElementById('step-note').style.display = 'none';
            document.getElementById('step-count').style.display = 'block';
        }

        function setPlayerCount(count) {
            targetPlayers = count;
            document.getElementById('step-count').style.display = 'none';
            document.getElementById('step-names').style.display = 'block';
        }

        function nextName() {
            let n = document.getElementById('nameInput').value.trim() || "P" + currentNameIndex;
            playerNames.push(n); playersScores[n] = 0;
            if (currentNameIndex < targetPlayers) {
                currentNameIndex++;
                document.getElementById('name-prompt').innerText = "PLAYER " + currentNameIndex + " NAME";
                document.getElementById('nameInput').value = "";
            } else { launchGame(); }
        }

        function launchGame() {
            document.getElementById('overlay').style.display = 'none';
            document.querySelectorAll('#ui, #leaderboard, #dist-panel').forEach(el => el.style.display = 'block');
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            PLANETS_DATA.forEach((p, i) => createPlanet(p, i));
            initAbly(); updateRanking();
        }

        function createPlanet(p, i) {
            const orbit = document.createElement('div');
            orbit.className = 'orbit';
            const size = 150 + (i * 45);
            orbit.style.width = orbit.style.height = size + "px";
            orbit.style.animationDuration = (12 + (i * 4)) + "s";
            
            const planet = document.createElement('div');
            planet.className = 'planet';
            planet.innerText = p.n;
            planet.style.backgroundColor = p.c;
            
            if(p.rings) {
                const r = document.createElement('div');
                r.className = 'rings';
                planet.appendChild(r);
            }

            planet.onmouseover = () => updateDistPanel(p);
            planet.onclick = (e) => {
                e.stopPropagation();
                updateDistPanel(p);
                playTone(baseFreq * p.r);
                createExplosion(e.clientX, e.clientY, p.c);
                let active = playerNames[currentPlayerTurn];
                playersScores[active] += 10;
                if(channel) channel.publish('scoreUpdate', {name: active, score: playersScores[active]});
                if(targetPlayers > 1) currentPlayerTurn = (currentPlayerTurn + 1) % targetPlayers;
                updateRanking();
            };

            orbit.appendChild(planet);
            document.getElementById('system-container').appendChild(orbit);
        }

        function updateDistPanel(p) {
            document.getElementById('p-full').innerText = p.full;
            document.getElementById('p-val').innerText = p.d;
        }

        function playTone(f) {
            if(!audioCtx) return;
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.frequency.value = f;
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + 0.5);
        }

        function createExplosion(x, y, c) {
            for (let i = 0; i < 6; i++) {
                const div = document.createElement('div');
                div.className = 'particle';
                div.style.left = x + 'px'; div.style.top = y + 'px';
                div.style.backgroundColor = c;
                document.body.appendChild(div);
                const a = Math.random() * Math.PI * 2;
                requestAnimationFrame(() => {
                    div.style.transform = `translate(${Math.cos(a)*50}px, ${Math.sin(a)*50}px) scale(0)`;
                    div.style.opacity = '0';
                });
                setTimeout(() => div.remove(), 600);
            }
        }

        function initAbly() {
            try {
                ably = new Ably.Realtime(ABLY_KEY);
                channel = ably.channels.get('gamaflak-room');
                channel.subscribe('scoreUpdate', (msg) => {
                    playersScores[msg.data.name] = msg.data.score;
                    updateRanking();
                });
            } catch(e) {}
        }

        function updateRanking() {
            const list = document.getElementById('player-list');
            const sorted = Object.entries(playersScores).sort((a,b) => b-a);
            let next = playerNames[currentPlayerTurn];
            list.innerHTML = `<div style="color:#ffcc00; font-size:10px; text-align:center; margin-bottom:5px;">RANKING</div>` + 
                sorted.map(([n, s]) => `<div class="leader-item ${n === next ? 'me-highlight' : ''}"><span>${n}</span><b>${s}</b></div>`).join('');
        }
    </script>
</body>
</html>

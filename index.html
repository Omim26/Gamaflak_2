<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gamaflak - Système Solaire Complet</title>
    <style>
        body { margin: 0; background: #050510; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; }
        #share-btn { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 15px 30px; background: #4A90E2; border: none; border-radius: 25px;
            color: white; font-weight: bold; font-size: 16px; cursor: pointer; pointer-events: auto;
        }
    </style>
</head>
<body>

<div id="ui">
    <h1 style="margin:0; font-size: 24px;">Gamaflak</h1>
    <p>Score: <span id="score">0</span></p>
</div>

<button id="share-btn" onclick="shareGame()">Partager mon score</button>

<!-- Éléments Audio (remplace les sources par tes fichiers) -->
<audio id="bgMusic" loop>
    <source src="musique.mp3" type="audio/mpeg">
</audio>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const bgMusic = document.getElementById('bgMusic');
    let score = 1250;
    let musicStarted = false;

    // Liste complète des 8 planètes
    const planets = [
        { name: "Mercure", dist: 50, size: 3, speed: 0.04, color: "#A5A5A5" },
        { name: "Vénus", dist: 80, size: 6, speed: 0.015, color: "#E3BB76" },
        { name: "Terre", dist: 110, size: 7, speed: 0.01, color: "#2271B3" },
        { name: "Mars", dist: 140, size: 5, speed: 0.008, color: "#E27B58" },
        { name: "Jupiter", dist: 210, size: 16, speed: 0.004, color: "#D39C7E" },
        { name: "Saturne", dist: 280, size: 14, speed: 0.002, color: "#F4D47A", hasRings: true },
        { name: "Uranus", dist: 340, size: 10, speed: 0.0015, color: "#BBE1E4" },
        { name: "Neptune", dist: 390, size: 10, speed: 0.001, color: "#6081FF" }
    ];

    // Génération de la ceinture d'astéroïdes (entre Mars et Jupiter)
    const asteroids = [];
    for(let i = 0; i < 120; i++) {
        asteroids.push({
            dist: 165 + Math.random() * 25,
            angle: Math.random() * Math.PI * 2,
            size: Math.random() * 1.2,
            speed: 0.004 + Math.random() * 0.002
        });
    }

    let angles = planets.map(() => Math.random() * Math.PI * 2);

    // Gestion de l'audio au premier clic (obligatoire sur mobile/navigateur)
    window.addEventListener('pointerdown', () => {
        if (!musicStarted && bgMusic.src) {
            bgMusic.play().catch(() => {});
            musicStarted = true;
        }
    });

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function draw() {
        ctx.fillStyle = "#050510";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;

        // ZOOM DYNAMIQUE (ajusté pour 8 planètes + ceinture)
        const maxDist = planets[planets.length - 1].dist + 30;
        const scale = Math.min(canvas.width, canvas.height) / (maxDist * 2.2);

        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.scale(scale, scale);

        // 1. Soleil
        ctx.beginPath();
        ctx.arc(0, 0, 25, 0, Math.PI * 2);
        ctx.fillStyle = "#FFD700";
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#FFD700";
        ctx.fill();
        ctx.shadowBlur = 0;

        // 2. Ceinture d'astéroïdes
        ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
        asteroids.forEach(as => {
            as.angle += as.speed;
            const ax = Math.cos(as.angle) * as.dist;
            const ay = Math.sin(as.angle) * as.dist;
            ctx.fillRect(ax, ay, as.size, as.size);
        });

        // 3. Planètes
        planets.forEach((p, i) => {
            angles[i] += p.speed;
            const x = Math.cos(angles[i]) * p.dist;
            const y = Math.sin(angles[i]) * p.dist;

            // Orbite
            ctx.beginPath();
            ctx.arc(0, 0, p.dist, 0, Math.PI * 2);
            ctx.strokeStyle = "rgba(255, 255, 255, 0.08)";
            ctx.lineWidth = 1 / scale;
            ctx.stroke();

            // Anneaux de Saturne (corrigés visuellement)
            if (p.hasRings) {
                ctx.beginPath();
                ctx.ellipse(x, y, p.size * 2.2, p.size * 0.8, Math.PI / 8, 0, Math.PI * 2);
                ctx.strokeStyle = "rgba(210, 180, 140, 0.5)";
                ctx.lineWidth = 3;
                ctx.stroke();
            }

            // Planète
            ctx.beginPath();
            ctx.arc(x, y, p.size, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();
        });

        ctx.restore();

        document.getElementById('score').innerText = score;
        requestAnimationFrame(draw);
    }

    function shareGame() {
        const shareData = {
            title: 'Gamaflak',
            text: `Rejoins-moi sur Gamaflak ! Mon score est de ${score}.`,
            url: window.location.href
        };
        if (navigator.share) {
            navigator.share(shareData).catch((err) => console.log('Erreur:', err));
        } else {
            navigator.clipboard.writeText(window.location.href);
            alert("Lien copié !");
        }
    }

    draw();
</script>
</body>
</html>

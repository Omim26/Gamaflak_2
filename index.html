<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gamaflak 2 - Système Solaire</title>
    <!-- Liaison Manifest CRUCIALE pour le Play Store (0$) -->
    <link rel="manifest" href="manifest.json">
    <style>
        body { 
            margin: 0; 
            background: #050508; 
            color: white; 
            font-family: Arial, sans-serif; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        #space {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            perspective: 1000px;
        }

        /* Style des Sphères Planétaires */
        .planet {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            /* Effet 3D Sphérique */
            box-shadow: inset -15px -15px 30px rgba(0,0,0,0.7), 0 0 15px rgba(255,255,255,0.1);
            transition: transform 0.3s;
        }

        .planet:active { transform: scale(1.2); }

        /* Couleurs des 8 Planètes */
        .M { background: #979797; } /* Mercure */
        .V { background: #E3BB76; } /* Venus */
        .T { background: #2271B3; } /* Terre */
        .Ma { background: #E27B58; } /* Mars */
        .J { background: #D39C7E; } /* Jupiter */
        .S { background: #C5AB6E; } /* Saturne */
        .U { background: #BBE1E4; } /* Uranus */
        .N { background: #6081FF; } /* Neptune */

        .label-name {
            position: absolute;
            bottom: -20px;
            font-size: 10px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div id="space">
        <!-- Génération des 8 sphères -->
        <div class="planet M">M<span class="label-name">Mercure</span></div>
        <div class="planet V">V<span class="label-name">Vénus</span></div>
        <div class="planet T">T<span class="label-name">Terre</span></div>
        <div class="planet Ma">M<span class="label-name">Mars</span></div>
        <div class="planet J">J<span class="label-name">Jupiter</span></div>
        <div class="planet S">S<span class="label-name">Saturne</span></div>
        <div class="planet U">U<span class="label-name">Uranus</span></div>
        <div class="planet N">N<span class="label-name">Neptune</span></div>
    </div>

    <script>
        // ENREGISTREMENT DU SERVICE WORKER
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                .then(reg => console.log("Jeu prêt pour l'installation !"))
                .catch(err => console.log("Erreur SW : ", err));
            });
        }
    </script>
</body>
</html>
